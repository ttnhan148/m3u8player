<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ M3U8 Turbo Proxy Player</title>
    <!-- Thêm phông chữ hiện đại của Google -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- PWA / IOS Add to Homescreen -->
    <link rel="manifest" href="/static/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="M3U8 PLAYER">
    <link rel="apple-touch-icon" href="/static/logo.png">
    <meta name="theme-color" content="#000000">

    <!-- HLS.js cho thiết bị không Apple -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        :root {
            --bg-color: #000000;
            --card-bg: #141414;
            --accent-color: #E50914;
            /* Netflix Red */
            --accent-hover: #b20710;
            --text-main: #ffffff;
            --text-dim: #b3b3b3;
            --glass-border: rgba(255, 255, 255, 0.1);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-font-smoothing: antialiased;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 1100px;
            padding: 4rem 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 3rem;
            animation: netflixFadeIn 0.8s ease-out;
        }

        @keyframes netflixFadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        header {
            text-align: center;
        }

        h1 {
            font-size: 2.8rem;
            font-weight: 800;
            letter-spacing: -0.04em;
            color: var(--accent-color);
            text-transform: uppercase;
        }

        .subtitle {
            color: var(--text-dim);
            font-size: 1rem;
            font-weight: 500;
            margin-top: 0.5rem;
        }

        /* --- INPUT SECTION --- */
        .input-card {
            background: var(--card-bg);
            border-radius: 8px;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .input-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .label-text {
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        textarea {
            width: 100%;
            min-height: 80px;
            background: #2b2b2b;
            border: none;
            border-radius: 4px;
            color: white;
            padding: 1rem;
            font-size: 1rem;
            resize: none;
            outline: none;
            transition: var(--transition);
        }

        textarea:focus {
            background: #333333;
        }

        .btn-main {
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 0.8rem 2rem;
            border-radius: 4px;
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            text-transform: uppercase;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
        }

        .btn-main:hover {
            background-color: var(--accent-hover);
            transform: scale(1.02);
        }

        .btn-paste {
            background: transparent;
            color: var(--text-dim);
            border: 1px solid var(--text-dim);
            padding: 0.4rem 0.8rem;
            font-size: 0.75rem;
            font-weight: 700;
            border-radius: 4px;
            cursor: pointer;
            text-transform: uppercase;
        }

        /* --- PLAYER SECTION --- */
        .player-wrapper {
            width: 100%;
            background: #000;
            border-radius: 4px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.8);
        }

        video {
            width: 100%;
            aspect-ratio: 16/9;
            display: block;
        }

        .status-msg {
            margin-top: 1rem;
            font-size: 0.9rem;
            color: var(--text-dim);
            font-weight: 500;
            text-align: center;
        }

        /* --- EPISODES SECTION --- */
        .episodes-section {
            display: none;
            flex-direction: column;
            gap: 1.5rem;
        }

        .episodes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 0.75rem;
        }

        .ep-btn {
            background: #181818;
            border: none;
            padding: 1.25rem 1rem;
            color: var(--text-dim);
            font-size: 0.95rem;
            font-weight: 600;
            text-align: left;
            cursor: pointer;
            border-radius: 4px;
            transition: var(--transition);
        }

        .ep-btn:hover {
            background: #2b2b2b;
            color: white;
        }

        .ep-btn.active {
            background: #333;
            color: white;
            border-left: 4px solid var(--accent-color);
        }

        /* --- CACHE FOOTER --- */
        .cache-footer {
            margin-top: 2rem;
            padding: 2rem 0;
            border-top: 1px solid #222;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .cache-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .progress-bar-bg {
            width: 100%;
            height: 2px;
            background: #333;
        }

        #cacheProgressFill {
            height: 100%;
            background: var(--accent-color);
            width: 0%;
            transition: width 1s ease;
        }

        .btn-clear-all {
            background: #2b2b2b;
            border: 1px solid var(--glass-border);
            color: #ff453a;
            padding: 0.5rem 1rem;
            font-size: 0.75rem;
            font-weight: 700;
            cursor: pointer;
            border-radius: 4px;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: var(--transition);
        }

        .btn-clear-all:hover {
            background: #ff453a;
            color: white;
            border-color: #ff453a;
        }

        @media (max-width: 768px) {
            .container {
                padding: 2rem 1rem;
            }

            h1 {
                font-size: 2rem;
            }

            .episodes-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <header>
            <h1>M3U8 PLAYER</h1>
            <p class="subtitle">Trải nghiệm điện ảnh đỉnh cao.</p>
        </header>

        <!-- INPUT SECTION -->
        <div class="input-card">
            <div class="input-header">
                <span class="label-text">Dán danh sách tập phim</span>
                <button class="btn-paste" id="btnQuickActionPaste">Dán nhanh</button>
            </div>
            <textarea id="m3u8InputRaw" placeholder="Ví dụ: Tập 01|https://..."></textarea>
            <button class="btn-main" id="btnMainPlay">
                <svg width="24" height="24" fill="currentColor" viewBox="0 0 24 24">
                    <path d="M8 5v14l11-7z" />
                </svg>
                PHÁT
            </button>
        </div>

        <!-- PLAYER SECTION -->
        <div class="player-wrapper">
            <video id="videoPlayer" controls playsinline></video>
        </div>
        <div class="status-msg" id="statusMessage">Sẵn sàng phát.</div>

        <!-- EPISODES SECTION -->
        <div class="episodes-section" id="epListSection">
            <div class="label-text" style="font-size: 1rem; margin-bottom: 1rem;">Danh sách tập phim</div>
            <div class="episodes-grid" id="epGridContent"></div>
        </div>

        <!-- CACHE FOOTER -->
        <div class="cache-footer">
            <div class="cache-header">
                <span class="label-text" id="cacheLabel">BỘ NHỚ CACHE: 0 GB / 10 GB</span>
                <button class="btn-clear-all" id="btnClearStorage">Xóa Cache</button>
            </div>
            <div class="progress-bar-bg">
                <div id="cacheProgressFill"></div>
            </div>
        </div>
    </div>

    <script>
        const inputArea = document.getElementById('m3u8InputRaw');
        const btnPlay = document.getElementById('btnMainPlay');
        const btnPaste = document.getElementById('btnQuickActionPaste');
        const sectionEp = document.getElementById('epListSection');
        const gridEp = document.getElementById('epGridContent');
        const video = document.getElementById('videoPlayer');
        const status = document.getElementById('statusMessage');
        const cacheLabel = document.getElementById('cacheLabel');
        const cacheBar = document.getElementById('cacheProgressFill');
        const btnClear = document.getElementById('btnClearStorage');
        let hlsObj = null;

        // --- CACHE ---
        async function refreshCache() {
            try {
                const res = await fetch('/api/cache/status');
                const data = await res.json();
                if (data.size_gb !== undefined) {
                    cacheLabel.textContent = `BỘ NHỚ TẢI XUỐNG: ${data.size_gb} GB / ${data.max_gb} GB`;
                    cacheBar.style.width = `${data.percent}%`;
                }
            } catch { }
        }
        btnClear.onclick = async () => {
            if (confirm("Xóa tất cả nội dung tải xuống?")) {
                await fetch('/api/cache/clear', { method: 'POST' });
                refreshCache();
            }
        };
        setInterval(refreshCache, 10000);
        refreshCache();

        // --- CLIPBOARD ---
        async function tryManualPaste() {
            try {
                // Lệnh DUY NHẤT để yêu cầu OS Browser hiện hộp thoại xin quyền
                const text = await navigator.clipboard.readText();
                
                if (text && text.trim()) {
                    inputArea.value = text;
                    execute(text);
                }
            } catch (err) {
                // Để OS Browser tự quản lý, không hiện thông báo rác
                console.log("OS Browser Handled Permission.");
            }
        }

        btnPaste.onclick = tryManualPaste;

        // --- MAIN ---
        btnPlay.onclick = () => execute(inputArea.value);

        function execute(text) {
            const lines = text.split('\n').map(l => l.trim()).filter(l => l.length > 0);
            const episodes = [];
            const regex = /(https?:\/\/[^\s|]+\.m3u8[^\s|]*)/i;

            lines.forEach(line => {
                const match = line.match(regex);
                if (match) {
                    const url = match[0];
                    let title = line.includes('|') ? line.split('|')[0].trim() : "";
                    if (!title) {
                        const clean = line.replace(url, '').replace('|', '').trim();
                        title = clean || `Tập ${String(episodes.length + 1).padStart(2, '0')}`;
                    }
                    episodes.push({ title, url });
                }
            });

            if (episodes.length > 0) {
                gridEp.innerHTML = '';
                episodes.forEach((ep, i) => {
                    const btn = document.createElement('button');
                    btn.className = 'ep-btn';
                    btn.textContent = ep.title;
                    btn.onclick = () => play(ep.url, ep.title, i);
                    gridEp.appendChild(btn);
                });
                sectionEp.style.display = 'flex';
                play(episodes[0].url, episodes[0].title, 0);
            } else {
                status.innerHTML = '<span style="color:#E50914">KHÔNG TÌM THẤY VIDEO</span>';
            }
        }

        function play(url, title, idx) {
            const btns = gridEp.querySelectorAll('.ep-btn');
            btns.forEach((b, i) => b.classList.toggle('active', i === idx));

            const proxy = `/proxy/m3u8?url=${encodeURIComponent(url)}`;
            status.textContent = `ĐANG PHÁT: ${title.toUpperCase()}`;

            if (hlsObj) { hlsObj.destroy(); hlsObj = null; }

            // Lắng nghe lỗi trên thẻ video (dành cho Native Player/Safari)
            video.onerror = () => {
                const errorMap = {
                    1: "Người dùng đã hủy tải video.",
                    2: "Lỗi đường truyền (Network Error).",
                    3: "Lỗi giải mã (Decoding Error).",
                    4: "Không tìm thấy phim hoặc link không hợp lệ."
                };
                const msg = errorMap[video.error ? video.error.code : 4] || "Lỗi không xác định.";
                alert(`[Native Player Error]: ${msg}\nTên tập: ${title}`);
                status.innerHTML = `<span style="color:#ff453a">LỖI: ${msg.toUpperCase()}</span>`;
            };

            if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = proxy;
                video.play().catch(() => {});
            } else if (Hls.isSupported()) {
                hlsObj = new Hls({
                    maxBufferLength: 30,
                    maxMaxBufferLength: 600,
                    manifestLoadingMaxRetry: 3
                });
                hlsObj.loadSource(proxy);
                hlsObj.attachMedia(video);
                hlsObj.on(Hls.Events.MANIFEST_PARSED, () => video.play().catch(() => {}));
                
                hlsObj.on(Hls.Events.ERROR, (event, data) => {
                    if (data.fatal) {
                        let errorMsg = "";
                        switch (data.type) {
                            case Hls.ErrorTypes.NETWORK_ERROR:
                                errorMsg = "Lỗi kết nối mạng (Network Error)";
                                break;
                            case Hls.ErrorTypes.MEDIA_ERROR:
                                errorMsg = "Lỗi định dạng phim (Media Error)";
                                break;
                            default:
                                errorMsg = "Lỗi hệ thống khởi tạo (System Error)";
                                break;
                        }
                        alert(`[HLS Error]: ${errorMsg}\nChi tiết: ${data.details}\nTên tập: ${title}`);
                        status.innerHTML = `<span style="color:#ff453a">LỖI: ${errorMsg.toUpperCase()}</span>`;
                        hlsObj.destroy();
                    }
                });
            }
        }
    </script>
</body>

</html>
